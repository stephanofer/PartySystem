config-version: 2

help.header: "<gradient:#8ec5ff:#e0c3fc><bold>PartySystem</bold></gradient> <dark_gray>·</dark_gray> <gray>Comandos de party</gray>"
help.create: "<click:run_command:'{create_command}'><hover:show_text:'<aqua>Crear una party'><dark_gray>•</dark_gray> <aqua>/{command} create</aqua> <gray>Crear party.</gray></hover></click>"
help.invite: "<click:suggest_command:'{invite_command}'><hover:show_text:'<aqua>Invitar jugador'><dark_gray>•</dark_gray> <aqua>/{command} invite <jugador></aqua> <gray>Invitar a tu party.</gray></hover></click>"
help.accept: "<click:suggest_command:'{accept_command}'><hover:show_text:'<green>Aceptar invitacion'><dark_gray>•</dark_gray> <aqua>/{command} accept <jugador></aqua> <gray>Aceptar invitacion.</gray></hover></click>"
help.deny: "<click:suggest_command:'{deny_command}'><hover:show_text:'<red>Rechazar invitacion'><dark_gray>•</dark_gray> <aqua>/{command} deny <jugador></aqua> <gray>Rechazar invitacion.</gray></hover></click>"
help.withdraw: "<click:suggest_command:'{withdraw_command}'><hover:show_text:'<yellow>Retirar invitacion'><dark_gray>•</dark_gray> <aqua>/{command} withdraw <jugador></aqua> <gray>Retirar invitacion enviada.</gray></hover></click>"
help.pending: "<click:run_command:'{pending_command}'><hover:show_text:'<aqua>Ver invitaciones'><dark_gray>•</dark_gray> <aqua>/{command} pending</aqua> <gray>Ver invitaciones.</gray></hover></click>"
help.list: "<click:run_command:'{list_command}'><hover:show_text:'<aqua>Ver miembros'><dark_gray>•</dark_gray> <aqua>/{command} list</aqua> <gray>Ver miembros.</gray></hover></click>"
help.leave: "<click:run_command:'{leave_command}'><hover:show_text:'<yellow>Salir'><dark_gray>•</dark_gray> <aqua>/{command} leave</aqua> <gray>Salir de la party.</gray></hover></click>"
help.kick: "<click:suggest_command:'{kick_command}'><hover:show_text:'<red>Expulsar miembro'><dark_gray>•</dark_gray> <aqua>/{command} kick <jugador></aqua> <gray>Expulsar miembro.</gray></hover></click>"
help.transfer: "<click:suggest_command:'{transfer_command}'><hover:show_text:'<yellow>Transferir leader'><dark_gray>•</dark_gray> <aqua>/{command} transfer <jugador></aqua> <gray>Transferir liderazgo.</gray></hover></click>"
