config-version: 3

help.header: "<gradient:#8ec5ff:#e0c3fc><bold>PartySystem</bold></gradient> <dark_gray>·</dark_gray> <gray>Party commands</gray>"
help.invite: "<click:suggest_command:'{invite_command}'><hover:show_text:'<aqua>Invite player'><dark_gray>•</dark_gray> <aqua>/{command} invite <player></aqua> <gray>Invite and create a party on accept.</gray></hover></click>"
help.accept: "<click:suggest_command:'{accept_command}'><hover:show_text:'<green>Accept invite'><dark_gray>•</dark_gray> <aqua>/{command} accept <player></aqua> <gray>Accept invite.</gray></hover></click>"
help.deny: "<click:suggest_command:'{deny_command}'><hover:show_text:'<red>Deny invite'><dark_gray>•</dark_gray> <aqua>/{command} deny <player></aqua> <gray>Deny invite.</gray></hover></click>"
help.withdraw: "<click:suggest_command:'{withdraw_command}'><hover:show_text:'<yellow>Withdraw invite'><dark_gray>•</dark_gray> <aqua>/{command} withdraw <player></aqua> <gray>Withdraw sent invite.</gray></hover></click>"
help.pending: "<click:run_command:'{pending_command}'><hover:show_text:'<aqua>View invites'><dark_gray>•</dark_gray> <aqua>/{command} pending</aqua> <gray>View invites.</gray></hover></click>"
help.list: "<click:run_command:'{list_command}'><hover:show_text:'<aqua>View members'><dark_gray>•</dark_gray> <aqua>/{command} list</aqua> <gray>View members.</gray></hover></click>"
help.leave: "<click:run_command:'{leave_command}'><hover:show_text:'<yellow>Leave'><dark_gray>•</dark_gray> <aqua>/{command} leave</aqua> <gray>Leave the party.</gray></hover></click>"
help.kick: "<click:suggest_command:'{kick_command}'><hover:show_text:'<red>Kick member'><dark_gray>•</dark_gray> <aqua>/{command} kick <player></aqua> <gray>Kick member.</gray></hover></click>"
help.transfer: "<click:suggest_command:'{transfer_command}'><hover:show_text:'<yellow>Transfer leader'><dark_gray>•</dark_gray> <aqua>/{command} transfer <player></aqua> <gray>Transfer leadership.</gray></hover></click>"
help.disband: "<click:run_command:'{disband_command}'><hover:show_text:'<red>Disband party'><dark_gray>•</dark_gray> <aqua>/{command} disband</aqua> <gray>Disband party.</gray></hover></click>"
help.chat: "<click:suggest_command:'{chat_command}'><hover:show_text:'<aqua>Send party chat'><dark_gray>•</dark_gray> <aqua>/{command} chat <message></aqua> <gray>Send message.</gray></hover></click>"
help.togglechat: "<click:run_command:'{togglechat_command}'><hover:show_text:'<aqua>Toggle chat'><dark_gray>•</dark_gray> <aqua>/{command} togglechat</aqua> <gray>Toggle party chat.</gray></hover></click>"

player-only: "<red>Only players can use this command.</red>"
cooldown: "<yellow>Wait <white>{seconds}s</white> before using that again.</yellow>"
player.not-found: "<red>I could not find <white>{player_name}</white>.</red>"
player.self: "<red>You cannot do that with yourself.</red>"

party.already-in-party: "<red>You are already in a party.</red>"
party.not-in-party: "<red>You are not in a party.</red>"
party.target-in-party: "<red><player_identity> <red>is already in a party.</red>"
party.full: "<red>Your party reached the limit of <white>{limit}</white> members.</red>"
party.not-leader: "<red>Only the party leader can do that.</red>"
party.member-not-found: "<red><player_identity> <red>is not in your party.</red>"
party.left: "<yellow>You left the party.</yellow>"
party.member-joined: "<green><player_identity> <green>joined the party.</green>"
party.member-left: "<yellow><player_identity> <yellow>left the party.</yellow>"
party.member-kicked: "<yellow><player_identity> <yellow>was kicked from the party.</yellow>"
party.kicked-target: "<red>You were kicked from the party.</red>"
party.leader-transferred: "<green><player_identity> <green>is now the party leader.</green>"
party.disbanded: "<red>The party was disbanded.</red>"
party.disbanded-alone: "<yellow>The party was disbanded because you were left alone.</yellow>"
party.list-header: "<gradient:#8ec5ff:#e0c3fc><bold>Party</bold></gradient> <gray>{count}/{limit} members</gray> <dark_gray>·</dark_gray> <gray>Leader:</gray> <player_identity>"
party.list-entry: "<dark_gray>•</dark_gray> <player_identity> <dark_gray>·</dark_gray> <aqua>{role}</aqua> <dark_gray>·</dark_gray> <gray>{state}</gray> <dark_gray>·</dark_gray> <gray>{server}</gray>"
party.limit-owner: "<gray>Leader limit:</gray> <white>{limit}</white>"

invite.sent: "<green>You invited <player_identity> <green>to your party.</green>"
invite.received: "<gradient:#8ec5ff:#e0c3fc><bold>Party invite</bold></gradient> <gray>from</gray> <player_identity> <dark_gray>[</dark_gray><green><click:run_command:'{accept}'><hover:show_text:'<green>Accept invite'>Accept</hover></click></green><dark_gray>]</dark_gray> <dark_gray>[</dark_gray><red><click:run_command:'{deny}'><hover:show_text:'<red>Deny invite'>Deny</hover></click></red><dark_gray>]</dark_gray>"
invite.actionbar: "<green>{player_name} invited you to a party.</green>"
invite.already: "<yellow>An invite with <player_identity> <yellow>already exists.</yellow>"
invite.crossed: "<yellow><player_identity> <yellow>already invited you. Use <white>/party accept {player_name}</white>.</yellow>"
invite.none-incoming: "<red><player_identity> <red>did not send you a party invite.</red>"
invite.none-outgoing: "<red>You did not send a party invite to <player_identity><red>.</red>"
invite.accepted: "<green>You accepted <player_identity><green>'s invite.</green>"
invite.accepted-target: "<green><player_identity> <green>accepted your party invite.</green>"
invite.denied: "<yellow>You denied <player_identity><yellow>'s invite.</yellow>"
invite.denied-target: "<yellow><player_identity> <yellow>denied your party invite.</yellow>"
invite.withdrawn: "<yellow>You withdrew your invite to <player_identity><yellow>.</yellow>"
pending.header: "<gradient:#8ec5ff:#e0c3fc><bold>Party invites</bold></gradient>"
pending.incoming-empty: "<gray>You have no received invites.</gray>"
pending.outgoing-empty: "<gray>You have no sent invites.</gray>"
pending.incoming-entry: "<dark_gray>•</dark_gray> <player_identity> <dark_gray>[</dark_gray><green><click:run_command:'{accept_command}'>Accept</click></green><dark_gray>]</dark_gray> <dark_gray>[</dark_gray><red><click:run_command:'{deny_command}'>Deny</click></red><dark_gray>]</dark_gray>"
pending.outgoing-entry: "<dark_gray>•</dark_gray> <player_identity> <gray>pending</gray> <dark_gray>[</dark_gray><yellow><click:run_command:'{withdraw_command}'>Withdraw</click></yellow><dark_gray>]</dark_gray>"

chat.empty: "<red>The message is empty.</red>"
chat.error: "<red>Could not send the party message.</red>"
chat.too-long: "<red>The message is too long. Maximum: <white>{limit}</white>.</red>"
chat.toggled: "<green>Party chat: <white>{state}</white>.</green>"
chat.enabled: "enabled"
chat.disabled: "disabled"
